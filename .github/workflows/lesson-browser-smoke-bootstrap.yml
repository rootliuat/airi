name: Lesson Browser Smoke Bootstrap

run-name: Lesson Browser Smoke Bootstrap (${{ inputs.target_ref }})

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to check out and validate
        required: true
        default: feat/lesson-browser-smoke-ci
        type: string
      backend_url:
        description: Public lesson backend base URL
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target_ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: /lesson Real Browser Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PEPTUTOR_LESSON_REAL_BACKEND_URL: ${{ inputs.backend_url }}
      PEPTUTOR_LESSON_REAL_BACKEND_WAIT_TIMEOUT: '120'
      VITE_PEPTUTOR_LESSON_API_URL: ${{ inputs.backend_url }}
      VITE_PEPTUTOR_LESSON_EXPECT_DEBUG_SIGNALS: '1'
      VITE_PEPTUTOR_SKIP_REMOTE_ASSET_DOWNLOADS: '1'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref }}

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Verify smoke configuration
        run: |
          if [[ -z "${PEPTUTOR_LESSON_REAL_BACKEND_URL:-}" ]]; then
            echo "Missing backend_url workflow input" >&2
            exit 1
          fi

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Vitest browser mode
        run: pnpm exec playwright install --with-deps chromium

      - name: Run /lesson real-browser smoke
        run: |
          mkdir -p .artifacts
          set -o pipefail
          pnpm -F @proj-airi/stage-web test:run:browser:real | tee .artifacts/lesson-browser-smoke.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lesson-browser-smoke-bootstrap-${{ github.run_id }}
          path: .artifacts/lesson-browser-smoke.log
          if-no-files-found: ignore
          retention-days: 7
